<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P611 中文拼詞遊戲</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#f7f6f2; --surface:#ffffff; --text:#28251d; --muted:#6e6a62; --primary:#01696f; --border:#d4d1ca; --shadow:0 12px 30px rgba(40,37,29,.08); --r:24px; }
    *{box-sizing:border-box} body{margin:0;font-family:'General Sans','PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:960px;margin:0 auto;padding:48px 20px 80px} h1{font-size:clamp(2rem,1.2rem + 2vw,3.5rem);margin:0 0 12px}
    p{color:var(--muted);font-size:1.05rem;margin:0 0 28px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px}
    .card{background:var(--surface);border:1px solid rgba(40,37,29,.1);border-radius:var(--r);padding:28px;box-shadow:var(--shadow)}
    .tag{display:inline-block;padding:8px 14px;border-radius:999px;background:rgba(1,105,111,.1);color:var(--primary);font-weight:700;font-size:.92rem;margin-bottom:18px}
    .title{font-size:1.7rem;font-weight:700;margin-bottom:10px}.desc{min-height:52px}.btn{display:inline-block;margin-top:10px;padding:12px 18px;border-radius:999px;background:var(--primary);color:#fff;text-decoration:none;font-weight:700}
    .btn:hover{opacity:.92}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>P611 中文拼詞遊戲</h1>
    <p>這裡已整理成可直接打開的網頁入口，包含 P611a 與 P611b 兩個版本。</p>
    <div class="grid">
      <section class="card">
        <div class="tag">P611a</div>
        <div class="title">P611a 中文拼詞遊戲</div>
        <div class="desc">詞語包括：觸碰、火燭、金幣、作弊、漫畫、鰻魚、烏鴉、鎢絲。</div>
        <a class="btn" href="./p611a-chinese-spelling-game.html" target="_blank" rel="noopener noreferrer">打開遊戲</a>
      </section>
      <section class="card">
        <div class="tag">P611b</div>
        <div class="title">P611b 中文拼詞遊戲</div>
        <div class="desc">詞語包括：植物、殖民、卓越、闊綽、恢復、詼諧、魔術、描述。</div>
        <a class="btn" href="./p611b-chinese-spelling-game.html" target="_blank" rel="noopener noreferrer">打開遊戲</a>
      </section>

      <section class="card">
        <div class="tag">P611c</div>
        <div class="title">P611c 中文拼詞遊戲</div>
        <div class="desc">詞語包括：妻子、悽慘、照顧、僱主、消失、宵夜、申請、紳士。</div>
        <a class="btn" href="./p611c-chinese-spelling-game.html" target="_blank" rel="noopener noreferrer">打開遊戲</a>
      </section>
    </div>
  </div>
</body>
</html>
